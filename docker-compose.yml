services:
  app:
    build: .
    image: moradwan27/lab8-cicd:latest
    ports:
      - "3000:3000"
    environment:
      - MODE=docker
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=tasksdb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=tasksdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
